services:
  backend:
    build:
      context: ./tir-x-backend
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: >
      sh -c "dotnet restore tir-x-backend.slnx &&
             dotnet watch --non-interactive run --project src/TirX.API --urls http://0.0.0.0:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: "true"
      ConnectionStrings__Default: Host=db;Port=5432;Database=postgres;Username=postgres;Password=admin
    volumes:
      - ./tir-x-backend:/app
      - nuget-packages:/root/.nuget/packages
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ./tir-x-frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: >
      sh -c "npm install --legacy-peer-deps &&
             npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./tir-x-frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres-data:
  nuget-packages:
  frontend-node-modules:
